<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/belatz-logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nóminas Belatz - Sistema Enterprise para Ingenios Azucareros" />
    <meta name="theme-color" content="#2563EB" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Nóminas Belatz - Sistema Enterprise</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      .initial-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F8FAFC;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
      }

      .initial-loader .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 36px;
      }

      .initial-loader .brand-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.2);
      }

      .initial-loader .brand-text {
        display: flex;
        flex-direction: column;
      }

      .initial-loader .brand-name {
        font-size: 1.375rem;
        font-weight: 700;
        color: #0F172A;
        line-height: 1.2;
      }

      .initial-loader .brand-sub {
        font-size: 0.75rem;
        color: #64748B;
        letter-spacing: 0.04em;
      }

      .initial-loader .spinner-track {
        width: 40px;
        height: 40px;
        position: relative;
      }

      .initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top-color: #2563EB;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .initial-loader .loading-text {
        margin-top: 16px;
        font-size: 0.8125rem;
        color: #94A3B8;
        letter-spacing: 0.02em;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="brand">
          <img class="brand-logo" src="/belatz-logo.jpg" alt="Belatz"
               onerror="this.style.display='none'" />
          <div class="brand-text">
            <span class="brand-name">Nóminas Belatz</span>
            <span class="brand-sub">Sistema Enterprise</span>
          </div>
        </div>
        <div class="spinner-track">
          <div class="spinner"></div>
        </div>
        <p class="loading-text">Cargando sistema...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
