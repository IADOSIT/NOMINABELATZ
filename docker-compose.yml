version: '3.8'

services:

  nominabelatz_web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nominabelatz-frontend
    ports:
      - "8088:80"
    restart: always
    environment:
      - VITE_API_URL=https://api.nominabelatz.com
    networks:
      - web_network

networks:
  web_network:
    external: true
