services:

  nominabelatz_api:
    container_name: nominabelatz_api
    build:
      context: .
      dockerfile: src/Presentacion/ImperhaNomninas.Api/Dockerfile
    ports:
      - "5010:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__ImperhaDb=Host=postgres_local;Port=5432;Database=nominabelatz_db;Username=administrador;Password=U191tl1ebFN2RJR0fld5QhC8U29AhdOQ
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - web_network
      - internet_out
    restart: unless-stopped

  nominabelatz_web:
    container_name: nominabelatz_web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5011:80"
    networks:
      - web_network
    depends_on:
      - nominabelatz_api
    restart: unless-stopped

networks:
  web_network:
    external: true
  internet_out:
    external: true
